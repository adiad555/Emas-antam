<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Belkin Power - Data Tim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --primary: #007AFF;
      --primary-light: #5AC8FA;
      --secondary: #00C7BE;
      --accent: #FF9500;
      --success: #34C759;
      --warning: #FFCC00;
      --bg: #0A0F1C;
      --card: #1C1C1E;
      --text: #FFFFFF;
      --text-muted: #8E8E93;
      --gradient-primary: linear-gradient(135deg, #007AFF, #5AC8FA);
      --gradient-secondary: linear-gradient(135deg, #00C7BE, #64D2FF);
      --gradient-success: linear-gradient(135deg, #34C759, #64D2FF);
      --gradient-warning: linear-gradient(135deg, #FF9500, #FFCC00);
      --gradient-belkin: linear-gradient(135deg, #0A0F1C, #1C2738);
      --shadow-belkin: 0 10px 30px rgba(0,0,0,0.7);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
      padding-bottom: 80px;
    }
    
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(90, 200, 250, 0.1) 0%, rgba(90, 200, 250, 0) 70%);
      filter: blur(40px);
      animation: float 20s infinite linear;
    }
    
    .bg-circle:nth-child(1) {
      width: 300px;
      height: 300px;
      top: 10%;
      left: 5%;
      background: radial-gradient(circle, rgba(0, 122, 255, 0.1) 0%, rgba(0, 122, 255, 0) 70%);
      animation-delay: 0s;
    }
    
    .bg-circle:nth-child(2) {
      width: 400px;
      height: 400px;
      top: 60%;
      left: 80%;
      background: radial-gradient(circle, rgba(0, 199, 190, 0.1) 0%, rgba(0, 199, 190, 0) 70%);
      animation-delay: -5s;
    }
    
    .bg-circle:nth-child(3) {
      width: 250px;
      height: 250px;
      top: 30%;
      left: 70%;
      background: radial-gradient(circle, rgba(255, 149, 0, 0.1) 0%, rgba(255, 149, 0, 0) 70%);
      animation-delay: -10s;
    }
    
    @keyframes float {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }
      25% {
        transform: translate(20px, 20px) rotate(90deg);
      }
      50% {
        transform: translate(0, 40px) rotate(180deg);
      }
      75% {
        transform: translate(-20px, 20px) rotate(270deg);
      }
      100% {
        transform: translate(0, 0) rotate(360deg);
      }
    }
    
    header {
      background: var(--gradient-belkin);
      padding: 15px 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
      position: relative;
      z-index: 1;
    }
    
    .back-button {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
    }
    
    .back-button:hover {
      background: rgba(255,255,255,0.15);
      transform: translateX(-3px);
    }
    
    .page-title {
      text-align: center;
      padding: 20px 0 0;
    }
    
    .page-title h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #5AC8FA, #FFFFFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .page-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 500;
    }
    
    main {
      padding: 16px;
      max-width: 1000px;
      margin: auto;
    }
    
    /* Stats Section */
    .stats-section {
      margin-bottom: 20px;
    }
    
    .stats-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .stats-title i {
      color: var(--primary);
    }
    
    .stats-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-card {
      background: var(--gradient-belkin);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow-belkin);
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
    }
    
    .stat-card.active::before {
      background: var(--gradient-success);
    }
    
    .stat-card.inactive::before {
      background: var(--gradient-warning);
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    
    .stat-card.active .stat-value {
      background: var(--gradient-success);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .stat-card.inactive .stat-value {
      background: var(--gradient-warning);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    /* Level Tabs */
    .level-tabs {
      display: flex;
      background: var(--gradient-belkin);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow-belkin);
    }
    
    .level-tab {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    
    .level-tab.active {
      background: var(--gradient-primary);
      color: white;
      box-shadow: var(--shadow-belkin);
    }
    
    .level-tab:nth-child(2).active {
      background: var(--gradient-secondary);
    }
    
    .level-tab:nth-child(3).active {
      background: linear-gradient(135deg, #FF9500, #FFCC00);
    }
    
    .level-badge {
      font-size: 11px;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .level-tab.active .level-badge {
      background: rgba(255,255,255,0.3);
    }
    
    /* Team Section */
    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.5px;
      padding-left: 8px;
    }
    
    .section-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 20px;
      background: var(--gradient-primary);
      border-radius: 3px;
    }
    
    .team-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .team-item {
      background: var(--gradient-belkin);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-belkin);
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .team-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    
    .team-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
    }
    
    .team-item.active::before {
      background: var(--gradient-success);
    }
    
    .team-item.inactive::before {
      background: var(--gradient-warning);
    }
    
    .team-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .team-phone {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    
    .team-status {
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .status-active {
      background: linear-gradient(135deg, rgba(52, 199, 89, 0.2), rgba(52, 199, 89, 0.1));
      color: #34C759;
      border: 1px solid rgba(52, 215, 75, 0.3);
    }
    
    .status-inactive {
      background: linear-gradient(135deg, rgba(255, 149, 0, 0.2), rgba(255, 149, 0, 0.1));
      color: #FF9500;
      border: 1px solid rgba(255, 149, 0, 0.3);
    }
    
    .team-details {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .team-level {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .team-level i {
      color: var(--primary);
    }
    
    .team-date {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      background: var(--gradient-belkin);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow-belkin);
    }
    
    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
      color: var(--primary);
    }
    
    .empty-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .empty-description {
      font-size: 14px;
      line-height: 1.5;
    }
    
    /* Bottom Navigation */
    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--gradient-belkin);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    
    nav.bottom .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text-muted);
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 14px;
      position: relative;
      flex: 1;
      max-width: 80px;
    }
    
    nav.bottom .nav-item.active {
      color: var(--primary);
      background: rgba(0,122,255,0.15);
    }
    
    nav.bottom .nav-item.active .nav-icon {
      transform: scale(1.1);
      color: var(--primary);
    }
    
    nav.bottom .nav-item.active .nav-label {
      color: var(--primary);
      font-weight: 700;
    }
    
    .nav-icon {
      font-size: 22px;
      margin-bottom: 4px;
      transition: all 0.3s ease;
    }
    
    .nav-label {
      font-size: 11px;
      font-weight: 600;
      transition: color 0.3s ease;
    }
    
    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 8px;
    }
    
    @keyframes loading {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }
    
    /* Responsive */
    @media (max-width: 380px) {
      .stat-card {
        padding: 16px;
        min-height: 90px;
      }
      
      .stat-value {
        font-size: 22px;
      }
      
      .team-item {
        padding: 16px;
      }
      
      .stats-container {
        gap: 8px;
      }
      
      .page-title h1 {
        font-size: 24px;
      }
      
      .page-subtitle {
        font-size: 14px;
      }
    }
    
    @media (max-width: 340px) {
      .stats-container {
        grid-template-columns: 1fr;
      }
      
      .level-tabs {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
  </div>

  <header>
    <button class="back-button" onclick="goPage('dashboard.html')">
      <i class="fas fa-arrow-left"></i>
    </button>
    
    <div class="page-title">
      <h1>Data Tim</h1>
      <p class="page-subtitle">Lihat statistik dan anggota tim Anda</p>
    </div>
  </header>
  
  <main>
    <div class="stats-section">
      <div class="stats-title">
        <i class="fas fa-chart-line"></i>
        <span>Anggota Aktif</span>
      </div>
      <div class="stats-container">
        <div class="stat-card active">
          <div class="stat-value" id="level1Active">0</div>
          <div class="stat-label">Level 1</div>
        </div>
        <div class="stat-card active">
          <div class="stat-value" id="level2Active">0</div>
          <div class="stat-label">Level 2</div>
        </div>
        <div class="stat-card active">
          <div class="stat-value" id="level3Active">0</div>
          <div class="stat-label">Level 3</div>
        </div>
      </div>
      
      <div class="stats-title">
        <i class="fas fa-users"></i>
        <span>Anggota Tidak Aktif</span>
      </div>
      <div class="stats-container">
        <div class="stat-card inactive">
          <div class="stat-value" id="level1Inactive">0</div>
          <div class="stat-label">Level 1</div>
        </div>
        <div class="stat-card inactive">
          <div class="stat-value" id="level2Inactive">0</div>
          <div class="stat-label">Level 2</div>
        </div>
        <div class="stat-card inactive">
          <div class="stat-value" id="level3Inactive">0</div>
          <div class="stat-label">Level 3</div>
        </div>
      </div>
    </div>

    <div class="level-tabs">
      <button class="level-tab active" onclick="showLevel('level1')">
        <span>Level 1</span>
        <span class="level-badge" id="level1Badge">0 anggota</span>
      </button>
      <button class="level-tab" onclick="showLevel('level2')">
        <span>Level 2</span>
        <span class="level-badge" id="level2Badge">0 anggota</span>
      </button>
      <button class="level-tab" onclick="showLevel('level3')">
        <span>Level 3</span>
        <span class="level-badge" id="level3Badge">0 anggota</span>
      </button>
    </div>

    <section class="team-section">
      <h2 class="section-title">Anggota Tim</h2>
      <div class="team-list" id="teamList">
        <!-- Data tim akan dimuat di sini -->
      </div>
    </section>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom">
    <a href="dashboard.html" class="nav-item">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-label">Beranda</span>
    </a>
    <a href="investasi.html" class="nav-item">
      <i class="fas fa-chart-line nav-icon"></i>
      <span class="nav-label">Investasi</span>
    </a>
    <a href="tim.html" class="nav-item active">
      <i class="fas fa-users nav-icon"></i>
      <span class="nav-label">Tim</span>
    </a>
    <a href="profil.html" class="nav-item">
      <i class="fas fa-user nav-icon"></i>
      <span class="nav-label">Profil</span>
    </a>
  </nav>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuJSxpcFZ1QI-dEsEnx2qSqlb0wsvs6Mc",
      authDomain: "lginvest-776cf.firebaseapp.com",
      databaseURL: "https://lginvest-776cf-default-rtdb.firebaseio.com",
      projectId: "lginvest-776cf",
      storageBucket: "lginvest-776cf.firebasestorage.app",
      messagingSenderId: "831934282072",
      appId: "1:831934282072:web:6a8b7a5bcba5d4d1264d2d",
      measurementId: "G-265YF9DYCF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentLevel = 'level1';
    let teamData = {
      level1: [],
      level2: [],
      level3: []
    };

    // Fungsi untuk sensor nomor HP
    function maskPhoneNumber(phone) {
      if (!phone || phone.length < 8) return '***';
      
      const firstThree = phone.substring(0, 3);
      const lastThree = phone.substring(phone.length - 3);
      
      const middleLength = phone.length - 6;
      const stars = '*'.repeat(middleLength > 4 ? 4 : middleLength);
      
      return `${firstThree}${stars}${lastThree}`;
    }

    // Fungsi untuk memformat tanggal
    function formatDate(timestamp) {
      try {
        const date = new Date(timestamp);
        if (isNaN(date.getTime())) {
          return 'Tanggal tidak valid';
        }
        const day = date.getDate().toString().padStart(2, '0');
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const year = date.getFullYear();
        
        return `${day}/${month}/${year}`;
      } catch (error) {
        return 'Tanggal tidak valid';
      }
    }

    // Fungsi untuk menampilkan loading skeleton
    function showLoadingSkeleton() {
      const teamList = document.getElementById('teamList');
      teamList.innerHTML = '';
      
      for (let i = 0; i < 5; i++) {
        const div = document.createElement('div');
        div.className = 'team-item skeleton';
        div.style.height = '100px';
        teamList.appendChild(div);
      }
    }

    // Fungsi untuk memuat data tim
    async function loadTeamData() {
      const nohp = localStorage.getItem('nohp');
      if (!nohp) {
        window.location.href = 'index.html';
        return;
      }

      // Tampilkan loading skeleton
      showLoadingSkeleton();

      try {
        // Ambil data user
        const refUser = ref(db, 'users/' + nohp);
        const snapUser = await get(refUser);
        
        if (!snapUser.exists()) {
          window.location.href = 'index.html';
          return;
        }

        // Reset data
        teamData = {
          level1: [],
          level2: [],
          level3: []
        };

        // Load semua level
        const [level1Data, level2Data, level3Data] = await Promise.all([
          loadLevelData(nohp, 1),
          loadLevelData(nohp, 2),
          loadLevelData(nohp, 3)
        ]);

        teamData.level1 = level1Data;
        teamData.level2 = level2Data;
        teamData.level3 = level3Data;

        // Update statistics
        updateStatistics();
        
        // Display current level
        displayTeam(currentLevel);

      } catch (error) {
        console.error('Error loading team data:', error);
        showEmptyState();
      }
    }

    // Fungsi untuk memuat data level
    async function loadLevelData(parentPhone, level) {
      const members = [];
      
      try {
        // Cari semua user yang memiliki upline sesuai dengan parentPhone
        const refUsers = ref(db, 'users');
        const snapUsers = await get(refUsers);
        
        if (snapUsers.exists()) {
          const allUsers = snapUsers.val();
          
          for (const [nohp, userData] of Object.entries(allUsers)) {
            if (nohp === parentPhone) continue;
            
            if (userData.upline) {
              if (level === 1) {
                // Level 1: langsung dari parent
                if (userData.upline === parentPhone) {
                  const isActive = await checkUserActive(nohp);
                  members.push({
                    nohp: nohp,
                    level: level,
                    isActive: isActive,
                    joinDate: userData.created_at || new Date().toISOString()
                  });
                }
              } else if (level === 2) {
                // Level 2: cek upline dari user ini apakah level 1 dari parent
                const upline1 = userData.upline;
                if (upline1 && upline1 !== parentPhone) {
                  const refUpline1 = ref(db, 'users/' + upline1);
                  const snapUpline1 = await get(refUpline1);
                  
                  if (snapUpline1.exists()) {
                    const upline1Data = snapUpline1.val();
                    if (upline1Data.upline === parentPhone) {
                      const isActive = await checkUserActive(nohp);
                      members.push({
                        nohp: nohp,
                        level: level,
                        isActive: isActive,
                        joinDate: userData.created_at || new Date().toISOString()
                      });
                    }
                  }
                }
              } else if (level === 3) {
                // Level 3: cek upline dari upline dari user ini apakah level 1 dari parent
                const upline1 = userData.upline;
                if (upline1) {
                  const refUpline1 = ref(db, 'users/' + upline1);
                  const snapUpline1 = await get(refUpline1);
                  
                  if (snapUpline1.exists()) {
                    const upline1Data = snapUpline1.val();
                    const upline2 = upline1Data.upline;
                    
                    if (upline2 && upline2 !== parentPhone) {
                      const refUpline2 = ref(db, 'users/' + upline2);
                      const snapUpline2 = await get(refUpline2);
                      
                      if (snapUpline2.exists()) {
                        const upline2Data = snapUpline2.val();
                        if (upline2Data.upline === parentPhone) {
                          const isActive = await checkUserActive(nohp);
                          members.push({
                            nohp: nohp,
                            level: level,
                            isActive: isActive,
                            joinDate: userData.created_at || new Date().toISOString()
                          });
                        }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      } catch (error) {
        console.error(`Error loading level ${level} data:`, error);
      }
      
      return members;
    }

    // Fungsi untuk mengecek apakah user aktif (punya pembelian)
    async function checkUserActive(nohp) {
      try {
        const refPurchases = ref(db, 'purchases/' + nohp);
        const snapPurchases = await get(refPurchases);
        return snapPurchases.exists() && Object.keys(snapPurchases.val()).length > 0;
      } catch (error) {
        console.error('Error checking user active:', error);
        return false;
      }
    }

    // Fungsi untuk update statistik aktif dan tidak aktif
    function updateStatistics() {
      // Hitung jumlah aktif dan tidak aktif per level
      const level1Active = teamData.level1.filter(member => member.isActive).length;
      const level2Active = teamData.level2.filter(member => member.isActive).length;
      const level3Active = teamData.level3.filter(member => member.isActive).length;

      const level1Inactive = teamData.level1.length - level1Active;
      const level2Inactive = teamData.level2.length - level2Active;
      const level3Inactive = teamData.level3.length - level3Active;

      // Update statistik aktif
      document.getElementById('level1Active').textContent = level1Active;
      document.getElementById('level2Active').textContent = level2Active;
      document.getElementById('level3Active').textContent = level3Active;

      // Update statistik tidak aktif
      document.getElementById('level1Inactive').textContent = level1Inactive;
      document.getElementById('level2Inactive').textContent = level2Inactive;
      document.getElementById('level3Inactive').textContent = level3Inactive;

      // Update badges di tab
      document.getElementById('level1Badge').textContent = `${teamData.level1.length} anggota`;
      document.getElementById('level2Badge').textContent = `${teamData.level2.length} anggota`;
      document.getElementById('level3Badge').textContent = `${teamData.level3.length} anggota`;
    }

    // Fungsi untuk menampilkan tim berdasarkan level
    function displayTeam(level) {
      const teamList = document.getElementById('teamList');
      const members = teamData[level] || [];
      
      if (members.length === 0) {
        showEmptyState(level);
        return;
      }

      teamList.innerHTML = '';
      
      members.forEach(member => {
        const div = document.createElement('div');
        div.className = `team-item ${member.isActive ? 'active' : 'inactive'}`;
        div.innerHTML = `
          <div class="team-header">
            <div class="team-phone">${maskPhoneNumber(member.nohp)}</div>
            <div class="team-status ${member.isActive ? 'status-active' : 'status-inactive'}">
              ${member.isActive ? 'Aktif' : 'Tidak Aktif'}
            </div>
          </div>
          <div class="team-details">
            <div class="team-level">
              <i class="fas fa-layer-group"></i>
              <span>Level ${member.level}</span>
            </div>
            <div class="team-date">${formatDate(member.joinDate)}</div>
          </div>
        `;
        teamList.appendChild(div);
      });
    }

    // Fungsi untuk menampilkan level yang dipilih
    function showLevel(level) {
      currentLevel = level;
      
      // Update active tab
      document.querySelectorAll('.level-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      
      event.currentTarget.classList.add('active');
      
      // Tampilkan tim
      displayTeam(level);
    }

    function showEmptyState(level) {
      const teamList = document.getElementById('teamList');
      const levelText = level === 'level1' ? 'Level 1' : level === 'level2' ? 'Level 2' : 'Level 3';
      
      teamList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <i class="fas fa-users"></i>
          </div>
          <div class="empty-title">Belum Ada Anggota</div>
          <div class="empty-description">
            Anda belum memiliki anggota di ${levelText}.
          </div>
        </div>
      `;
    }

    // Fungsi navigasi langsung tanpa pemberitahuan
    function goPage(page) {
      window.location.href = page;
    }

    window.goPage = goPage;
    window.showLevel = showLevel;

    document.addEventListener('DOMContentLoaded', () => {
      loadTeamData();
    });
  </script>
</body>
</html>
