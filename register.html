<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Daftar - Bitcoin Wallet</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Reset & Base - Tema Bitcoin Premium */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    }

    :root {
      --bitcoin-gold: #F7931A;
      --bitcoin-gold-light: #FFB347;
      --bitcoin-gold-dark: #E67E22;
      --bitcoin-dark: #0D0E15;
      --bitcoin-card: #13161F;
      --bitcoin-border: rgba(247, 147, 26, 0.25);
      --bitcoin-glow: rgba(247, 147, 26, 0.4);
      --text-primary: #FFFFFF;
      --text-secondary: #9CA3AF;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --gradient-gold: linear-gradient(135deg, #F7931A 0%, #FDC830 100%);
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0A0C10 0%, #030507 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Blockchain / Hexagon Pattern */
    .hex-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.06"><path fill="none" stroke="%23F7931A" stroke-width="0.5" d="M50 5 L93.3 27.5 L93.3 72.5 L50 95 L6.7 72.5 L6.7 27.5 Z M50 5 L50 27.5 L93.3 50 M50 27.5 L6.7 50 M50 27.5 L50 50 M6.7 50 L6.7 72.5 M93.3 50 L93.3 72.5 M50 50 L50 72.5 L93.3 95 M50 72.5 L6.7 95"/></svg>');
      background-size: 70px;
      background-repeat: repeat;
      pointer-events: none;
      z-index: -1;
    }

    /* Crypto dust particles */
    .crypto-dust {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .dust {
      position: absolute;
      background: radial-gradient(circle, #F7931A, transparent);
      border-radius: 50%;
      opacity: 0.15;
      animation: floatDust 15s infinite linear;
    }
    @keyframes floatDust {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      20% { opacity: 0.2; }
      80% { opacity: 0.1; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 480px;
      animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 2;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Crypto Card */
    .crypto-card {
      background: rgba(19, 22, 31, 0.9);
      backdrop-filter: blur(18px);
      border-radius: 42px;
      padding: 34px 28px;
      border: 1px solid rgba(247, 147, 26, 0.35);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(247, 147, 26, 0.1), 0 0 30px rgba(247, 147, 26, 0.2);
      transition: transform 0.2s ease;
    }
    .crypto-card:hover {
      transform: scale(1.01);
    }

    /* Logo Area */
    .logo-bitcoin {
      text-align: center;
      margin-bottom: 28px;
    }
    .btc-icon-box {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 18px;
      background: linear-gradient(145deg, #1E232F, #0F111A);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
      border: 1px solid rgba(247, 147, 26, 0.4);
    }
    .btc-icon-box i {
      font-size: 56px;
      color: #F7931A;
      filter: drop-shadow(0 0 8px rgba(247,147,26,0.6));
      animation: pulseGold 2.5s infinite;
    }
    @keyframes pulseGold {
      0% { text-shadow: 0 0 0px #F7931A; transform: scale(1); }
      50% { text-shadow: 0 0 12px #F7931A; transform: scale(1.02); }
      100% { text-shadow: 0 0 0px #F7931A; transform: scale(1); }
    }
    .ring-gold {
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      border-radius: 50%;
      border: 1px solid rgba(247, 147, 26, 0.5);
      animation: rotateRing 18s linear infinite;
    }
    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .brand-crypto h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #F7931A, #FDC830);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .brand-crypto p {
      color: #B0B7C9;
      font-size: 14px;
      background: rgba(247,147,26,0.12);
      display: inline-block;
      padding: 5px 14px;
      border-radius: 40px;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 22px;
    }
    .form-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 14px;
      color: #E5E7EB;
    }
    .form-label i {
      color: #F7931A;
      font-size: 16px;
    }
    .required {
      color: #F7931A;
      margin-left: 4px;
    }

    /* Phone group */
    .phone-group {
      display: flex;
      background: rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(247, 147, 26, 0.4);
      border-radius: 20px;
      transition: all 0.2s;
    }
    .phone-group:focus-within {
      border-color: #F7931A;
      box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.25);
      background: #0A0C12;
    }
    .prefix-62 {
      padding: 0 18px;
      background: rgba(247, 147, 26, 0.2);
      color: #F7931A;
      font-weight: 700;
      font-size: 17px;
      display: flex;
      align-items: center;
      border-right: 1px solid rgba(247, 147, 26, 0.3);
      border-radius: 20px 0 0 20px;
    }
    .phone-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 18px 16px;
      font-size: 17px;
      color: white;
      outline: none;
      font-weight: 500;
    }
    .phone-input::placeholder {
      color: #6B7280;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(247, 147, 26, 0.4);
      border-radius: 20px;
      padding: 18px 20px;
      font-size: 16px;
      color: white;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #F7931A;
      box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.25);
      background: #0A0C12;
    }
    .input-icon-wrap {
      position: relative;
    }
    .toggle-pwd {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      cursor: pointer;
      font-size: 18px;
    }
    .toggle-pwd:hover {
      color: #F7931A;
    }

    .form-hint {
      font-size: 12px;
      margin-top: 6px;
      margin-left: 12px;
      color: #9CA3AF;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .form-hint.success { color: #10B981; }
    .form-hint.error { color: #EF4444; }

    /* Password strength */
    .password-strength {
      margin-top: 8px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }
    .strength-bar {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background 0.3s;
      border-radius: 4px;
    }

    /* CAPTCHA */
    .captcha-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(247, 147, 26, 0.4);
      border-radius: 20px;
      padding: 6px 12px 6px 20px;
      margin-top: 5px;
    }
    .captcha-code {
      background: #0A0C12;
      padding: 12px 15px;
      border-radius: 18px;
      font-family: monospace;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 6px;
      color: #F7931A;
      text-shadow: 0 0 3px #F7931A;
      user-select: none;
    }
    .captcha-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 0;
      font-size: 18px;
      color: white;
      outline: none;
      text-align: center;
      font-weight: 600;
    }
    .refresh-captcha {
      background: rgba(247, 147, 26, 0.2);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      color: #F7931A;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .refresh-captcha:hover {
      background: rgba(247, 147, 26, 0.5);
      transform: rotate(15deg);
    }

    /* Submit Button */
    .submit-crypto {
      width: 100%;
      padding: 18px;
      background: linear-gradient(95deg, #F7931A, #F9B43A);
      border: none;
      border-radius: 34px;
      font-weight: 800;
      font-size: 18px;
      color: #0D0E15;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
      box-shadow: 0 8px 20px rgba(247, 147, 26, 0.3);
    }
    .submit-crypto:hover:enabled {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 28px rgba(247, 147, 26, 0.5);
    }
    .submit-crypto:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .spinner-gold {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(0,0,0,0.2);
      border-top: 3px solid #0D0E15;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-crypto {
      margin: 20px 0;
      display: none;
    }
    .progress-bar-bg {
      height: 5px;
      background: #262E3D;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill-gold {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #F7931A, #FDC830);
      border-radius: 10px;
      transition: width 0.4s;
    }

    .login-link {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(247, 147, 26, 0.2);
    }
    .login-link a {
      color: #F7931A;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(247, 147, 26, 0.1);
      padding: 12px 24px;
      border-radius: 40px;
      transition: 0.2s;
    }
    .login-link a:hover {
      background: rgba(247, 147, 26, 0.25);
      transform: translateY(-2px);
    }

    /* Modal Sukses */
    .modal-bit {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 5, 7, 0.96);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal-content {
      background: #13161F;
      border-radius: 48px;
      max-width: 360px;
      width: 90%;
      padding: 40px 28px;
      text-align: center;
      border: 1px solid #F7931A;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6);
      animation: modalPop 0.35s ease;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-icon-btc {
      background: radial-gradient(circle, #F7931A, #B85C00);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-icon-btc i { font-size: 44px; color: #0D0E15; }
    .modal-title-gold {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #F7931A, #FDC830);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .modal-text { color: #B0B7C9; margin: 20px 0 15px; font-size: 15px; line-height: 1.5; }

    @media (max-width: 480px) {
      .crypto-card { padding: 28px 18px; }
      .brand-crypto h1 { font-size: 28px; }
      .captcha-code { font-size: 22px; letter-spacing: 3px; }
    }
  </style>
</head>
<body>

<div class="hex-bg"></div>
<div class="crypto-dust" id="dustContainer"></div>

<div class="container">
  <div class="crypto-card">
    <div class="logo-bitcoin">
      <div class="btc-icon-box">
        <i class="fab fa-bitcoin"></i>
        <div class="ring-gold"></div>
      </div>
      <div class="brand-crypto">
        <h1>BITCOIN WALLET</h1>
        <p><i class="fas fa-shield-alt"></i> Daftar & Mulai Bertransaksi</p>
      </div>
    </div>

    <form id="registerFormCrypto">
      <div class="form-group">
        <label class="form-label"><i class="fab fa-whatsapp"></i> Nomor WhatsApp <span class="required">*</span></label>
        <div class="phone-group">
          <div class="prefix-62">+62</div>
          <input type="tel" class="phone-input" id="cryptoPhone" placeholder="81234567890" autofocus inputmode="numeric" onkeypress="return event.charCode >= 48 && event.charCode <= 57">
        </div>
        <div class="form-hint" id="phoneHint"><i class="fas fa-info-circle"></i> Tanpa 0 di depan, 9-13 digit</div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Kata Sandi <span class="required">*</span></label>
        <div class="input-icon-wrap">
          <input type="password" class="form-input" id="regPassword" placeholder="Minimal 6 karakter" required minlength="6">
          <i class="fas fa-eye toggle-pwd" id="toggleRegPwd"></i>
        </div>
        <div class="password-strength" id="pwdStrength">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-check-circle"></i> Konfirmasi Kata Sandi <span class="required">*</span></label>
        <div class="input-icon-wrap">
          <input type="password" class="form-input" id="confirmPassword" placeholder="Ulangi kata sandi" required>
          <i class="fas fa-eye toggle-pwd" id="toggleConfirmPwd"></i>
        </div>
        <div class="form-hint" id="confirmHint"></div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-gift"></i> Kode Referral (Opsional)</label>
        <input type="text" class="form-input" id="referralCode" placeholder="Masukkan kode referral jika ada">
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-shield-virus"></i> Kode Keamanan (CAPTCHA) <span class="required">*</span></label>
        <div class="captcha-row">
          <div class="captcha-code" id="captchaDisplay">1234</div>
          <input type="text" class="captcha-input" id="captchaInput" placeholder="4 digit" maxlength="4" inputmode="numeric" autocomplete="off">
          <button type="button" class="refresh-captcha" id="refreshCaptcha"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div class="form-hint" id="captchaHint"></div>
      </div>

      <div class="progress-crypto" id="progressCrypto">
        <div class="progress-bar-bg"><div class="progress-fill-gold" id="progressFillGold"></div></div>
      </div>

      <button type="submit" class="submit-crypto" id="cryptoSubmitBtn">
        <i class="fab fa-bitcoin"></i>
        <span id="btnText">DAFTAR WALLET</span>
        <div class="spinner-gold" id="spinnerGold"></div>
      </button>
    </form>

    <div class="login-link">
      <a href="index.html"><i class="fas fa-sign-in-alt"></i> Sudah punya akun? Masuk</a>
    </div>
  </div>
</div>

<!-- Modal Sukses -->
<div class="modal-bit" id="successModalBit">
  <div class="modal-content">
    <div class="modal-icon-btc"><i class="fas fa-check-circle"></i></div>
    <h3 class="modal-title-gold">BERHASIL!</h3>
    <p class="modal-text">Akun Bitcoin Wallet Anda telah aktif.<br>Anda akan diarahkan ke dashboard dalam 2 detik.</p>
    <div style="margin-top: 10px;"><i class="fas fa-spinner fa-pulse"></i> Memproses blockchain...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuJSxpcFZ1QI-dEsEnx2qSqlb0wsvs6Mc",
    authDomain: "lginvest-776cf.firebaseapp.com",
    databaseURL: "https://lginvest-776cf-default-rtdb.firebaseio.com",
    projectId: "lginvest-776cf",
    storageBucket: "lginvest-776cf.firebasestorage.app",
    messagingSenderId: "831934282072",
    appId: "1:831934282072:web:6a8b7a5bcba5d4d1264d2d",
    measurementId: "G-265YF9DYCF"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // DOM Elements
  const form = document.getElementById('registerFormCrypto');
  const phoneField = document.getElementById('cryptoPhone');
  const passwordField = document.getElementById('regPassword');
  const confirmField = document.getElementById('confirmPassword');
  const referralField = document.getElementById('referralCode');
  const captchaInput = document.getElementById('captchaInput');
  const refreshCaptchaBtn = document.getElementById('refreshCaptcha');
  const captchaDisplay = document.getElementById('captchaDisplay');
  const submitBtn = document.getElementById('cryptoSubmitBtn');
  const btnTextSpan = document.getElementById('btnText');
  const spinner = document.getElementById('spinnerGold');
  const progressDiv = document.getElementById('progressCrypto');
  const progressFill = document.getElementById('progressFillGold');
  const successModal = document.getElementById('successModalBit');
  const phoneHint = document.getElementById('phoneHint');
  const confirmHint = document.getElementById('confirmHint');
  const captchaHint = document.getElementById('captchaHint');

  // Toggle password visibility
  document.getElementById('toggleRegPwd').addEventListener('click', () => togglePassword(passwordField, document.getElementById('toggleRegPwd')));
  document.getElementById('toggleConfirmPwd').addEventListener('click', () => togglePassword(confirmField, document.getElementById('toggleConfirmPwd')));
  function togglePassword(input, icon) {
    const type = input.type === 'password' ? 'text' : 'password';
    input.type = type;
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
  }

  // Generate random 4 digit captcha
  let currentCaptcha = "";
  function generateCaptcha() {
    const num = Math.floor(1000 + Math.random() * 9000);
    currentCaptcha = num.toString();
    captchaDisplay.innerText = currentCaptcha;
    captchaInput.value = "";
    captchaHint.innerHTML = "";
    captchaHint.classList.remove('success', 'error');
  }
  generateCaptcha();
  refreshCaptchaBtn.addEventListener('click', () => generateCaptcha());

  // Validasi nomor HP (8xxxxxxx, 9-13 digit)
  function validatePhone(phoneDigits) {
    return /^8\d{8,12}$/.test(phoneDigits);
  }
  function getFullPhone(phoneDigits) { return '62' + phoneDigits; }

  // Format phone input
  phoneField.addEventListener('input', function(e) {
    this.value = this.value.replace(/\D/g, '');
  });
  phoneField.addEventListener('blur', function() {
    let raw = this.value.replace(/\D/g, '');
    if (raw.length >= 9) {
      let fmt = raw.replace(/(\d{3})(\d{4})(\d{0,4})/, '$1 $2 $3').trim();
      this.value = fmt;
    }
  });
  phoneField.addEventListener('focus', function() { this.value = this.value.replace(/\D/g, ''); });
  phoneField.addEventListener('keydown', (e) => { if(e.key === '0' && e.target.selectionStart === 0) e.preventDefault(); });

  // Real-time validasi konfirmasi password
  function validateConfirm() {
    const pwd = passwordField.value;
    const conf = confirmField.value;
    if (conf.length === 0) {
      confirmHint.innerHTML = "";
      return false;
    }
    if (pwd !== conf) {
      confirmHint.innerHTML = '<i class="fas fa-times-circle"></i> Kata sandi tidak cocok';
      confirmHint.classList.add('error');
      confirmHint.classList.remove('success');
      return false;
    } else {
      confirmHint.innerHTML = '<i class="fas fa-check-circle"></i> Cocok';
      confirmHint.classList.add('success');
      confirmHint.classList.remove('error');
      return true;
    }
  }
  confirmField.addEventListener('input', validateConfirm);
  passwordField.addEventListener('input', () => {
    validateConfirm();
    const strengthDiv = document.getElementById('pwdStrength');
    const strengthBar = document.getElementById('strengthBar');
    const pwd = passwordField.value;
    if (pwd.length === 0) { strengthDiv.style.display = 'none'; return; }
    strengthDiv.style.display = 'block';
    let strength = 0;
    if (pwd.length >= 6) strength += 25;
    if (pwd.length >= 8) strength += 25;
    if (/[A-Z]/.test(pwd)) strength += 20;
    if (/[0-9]/.test(pwd)) strength += 15;
    if (/[^A-Za-z0-9]/.test(pwd)) strength += 15;
    strength = Math.min(strength, 100);
    strengthBar.style.width = strength + '%';
    if (strength < 50) strengthBar.style.background = '#EF4444';
    else if (strength < 75) strengthBar.style.background = '#F59E0B';
    else strengthBar.style.background = '#10B981';
  });

  // Phone realtime hint
  phoneField.addEventListener('input', function() {
    const val = this.value.replace(/\D/g, '');
    if (val.length >= 9 && validatePhone(val)) {
      phoneHint.innerHTML = '<i class="fas fa-check-circle"></i> Nomor valid';
      phoneHint.classList.add('success'); phoneHint.classList.remove('error');
    } else if (val.length > 0 && val.length < 9) {
      phoneHint.innerHTML = `<i class="fas fa-times-circle"></i> Minimal 9 digit (${val.length}/9)`;
      phoneHint.classList.add('error'); phoneHint.classList.remove('success');
    } else if (val.length > 13) {
      phoneHint.innerHTML = '<i class="fas fa-times-circle"></i> Maksimal 13 digit';
      phoneHint.classList.add('error');
    } else {
      phoneHint.innerHTML = '<i class="fas fa-info-circle"></i> Format: 8xxxx (tanpa 0)';
      phoneHint.classList.remove('success','error');
    }
  });

  // Cek akun existing
  async function checkPhoneExists(phoneDigits) {
    const full = getFullPhone(phoneDigits);
    const snap = await get(ref(db, 'users/' + full));
    return snap.exists();
  }

  // Simpan user
  async function saveUser(phoneDigits, password, referral, deviceId, deviceCount) {
    const fullPhone = getFullPhone(phoneDigits);
    let upline = '';
    if (referral) {
      const usersSnap = await get(ref(db, 'users'));
      if (usersSnap.exists()) {
        for (const [key, val] of Object.entries(usersSnap.val())) {
          if (val.referral_code === referral) { upline = key; break; }
        }
      }
    }
    const userReferralCode = 'BTC' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const userData = {
      nohp: fullPhone,
      nama: 'Bitcoiner_' + fullPhone.slice(-4),
      password: password,
      referral_code: userReferralCode,
      referred_by: referral || '',
      upline: upline,
      saldo: 5000,
      poin: 0,
      status: 'active',
      device_id: deviceId,
      registration_count: deviceCount,
      created_at: new Date().toISOString(),
      last_login: new Date().toISOString()
    };
    await set(ref(db, 'users/' + fullPhone), userData);
    localStorage.setItem('currentUser', JSON.stringify(userData));
    localStorage.setItem('nohp', fullPhone);
    return userData;
  }

  // Device handling (batas 2 akun)
  function getDeviceId() {
    let id = localStorage.getItem('btc_device_id');
    if (!id) {
      id = 'dev_' + Math.random().toString(36).substr(2, 10) + '_' + Date.now();
      localStorage.setItem('btc_device_id', id);
    }
    return id;
  }
  async function checkDeviceRegCount(deviceId) {
    const snap = await get(ref(db, 'device_registrations/' + deviceId));
    return snap.exists() ? snap.val().count : 0;
  }
  async function incrementDeviceCount(deviceId) {
    const refDev = ref(db, 'device_registrations/' + deviceId);
    const snap = await get(refDev);
    let count = snap.exists() ? snap.val().count : 0;
    if (count >= 2) throw new Error('❌ Batas maksimal 2 akun per perangkat tercapai.');
    count++;
    await set(refDev, { count: count, last_reg: new Date().toISOString() });
    return count;
  }

  // Submit
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const rawPhone = phoneField.value.replace(/\D/g, '');
    const password = passwordField.value;
    const confirm = confirmField.value;
    const referral = referralField.value.trim();
    const captchaValue = captchaInput.value.trim();

    // Validasi
    if (!validatePhone(rawPhone)) {
      alert('Nomor WhatsApp tidak valid! (contoh: 81234567890, 9-13 digit)');
      phoneField.focus();
      return;
    }
    if (password.length < 6) {
      alert('Kata sandi minimal 6 karakter.');
      passwordField.focus();
      return;
    }
    if (password !== confirm) {
      alert('Konfirmasi kata sandi tidak cocok.');
      confirmField.focus();
      return;
    }
    if (captchaValue !== currentCaptcha) {
      captchaHint.innerHTML = '<i class="fas fa-times-circle"></i> Kode CAPTCHA salah!';
      captchaHint.classList.add('error');
      generateCaptcha(); // refresh hanya captcha
      captchaInput.value = '';
      return;
    } else {
      captchaHint.innerHTML = '<i class="fas fa-check-circle"></i> Valid';
      captchaHint.classList.remove('error');
    }

    // disable UI
    submitBtn.disabled = true;
    btnTextSpan.innerHTML = 'Memverifikasi...';
    spinner.style.display = 'inline-block';
    progressDiv.style.display = 'block';
    progressFill.style.width = '20%';

    try {
      progressFill.style.width = '40%';
      const phoneExists = await checkPhoneExists(rawPhone);
      if (phoneExists) throw new Error('Nomor WhatsApp sudah terdaftar.');
      progressFill.style.width = '60%';
      const deviceId = getDeviceId();
      let devCount = await checkDeviceRegCount(deviceId);
      if (devCount >= 2) throw new Error(`Batas pendaftaran perangkat (2 akun) sudah tercapai.`);
      const newCount = await incrementDeviceCount(deviceId);
      progressFill.style.width = '80%';
      await saveUser(rawPhone, password, referral, deviceId, newCount);
      progressFill.style.width = '100%';
      
      // Tampilkan modal sukses (notifikasi tengah layar)
      successModal.style.display = 'flex';
      
      // Reset form & button setelah delay, lalu redirect
      setTimeout(() => {
        submitBtn.disabled = false;
        btnTextSpan.innerHTML = 'DAFTAR WALLET';
        spinner.style.display = 'none';
        progressDiv.style.display = 'none';
        progressFill.style.width = '0%';
        window.location.href = 'dashboard.html';
      }, 2000); // 2 detik
      
    } catch (err) {
      progressDiv.style.display = 'none';
      submitBtn.disabled = false;
      btnTextSpan.innerHTML = 'DAFTAR WALLET';
      spinner.style.display = 'none';
      alert('❌ ' + err.message);
      generateCaptcha(); // refresh captcha saat error
    }
  });

  // generate dust particles
  function createDust() {
    const cont = document.getElementById('dustContainer');
    for (let i=0;i<40;i++) {
      let d = document.createElement('div');
      d.classList.add('dust');
      let s = Math.random()*4+2;
      d.style.width = s+'px'; d.style.height = s+'px';
      d.style.left = Math.random()*100+'%';
      d.style.animationDelay = Math.random()*20+'s';
      d.style.animationDuration = Math.random()*12+10+'s';
      cont.appendChild(d);
    }
  }
  createDust();
</script>
