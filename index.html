<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bitcoin Wallet - Akses Cepat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Reset & Base - Tema Bitcoin Premium */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Poppins', monospace;
    }

    :root {
      --bitcoin-gold: #F7931A;
      --bitcoin-gold-light: #FFB347;
      --bitcoin-gold-dark: #E67E22;
      --bitcoin-dark: #0D0E15;
      --bitcoin-card: #13161F;
      --bitcoin-border: rgba(247, 147, 26, 0.25);
      --bitcoin-glow: rgba(247, 147, 26, 0.4);
      --text-primary: #FFFFFF;
      --text-secondary: #9CA3AF;
      --success: #10B981;
      --danger: #EF4444;
      --gradient-gold: linear-gradient(135deg, #F7931A 0%, #FDC830 100%);
      --gradient-dark: linear-gradient(145deg, #0B0E14 0%, #131A26 100%);
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0A0C10 0%, #030507 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Blockchain / Hexagon Pattern Background */
    .hex-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.08"><path fill="none" stroke="%23F7931A" stroke-width="0.5" d="M50 5 L93.3 27.5 L93.3 72.5 L50 95 L6.7 72.5 L6.7 27.5 Z M50 5 L50 27.5 L93.3 50 M50 27.5 L6.7 50 M50 27.5 L50 50 M6.7 50 L6.7 72.5 M93.3 50 L93.3 72.5 M50 50 L50 72.5 L93.3 95 M50 72.5 L6.7 95"/></svg>');
      background-size: 70px;
      background-repeat: repeat;
      pointer-events: none;
      z-index: -1;
    }

    /* Floating Particle (Crypto dust) */
    .crypto-dust {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .dust {
      position: absolute;
      background: radial-gradient(circle, #F7931A, transparent);
      border-radius: 50%;
      opacity: 0.15;
      animation: floatDust 15s infinite linear;
    }
    @keyframes floatDust {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      20% { opacity: 0.2; }
      80% { opacity: 0.1; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }

    /* Main Container */
    .container {
      width: 100%;
      max-width: 460px;
      animation: fadeSlideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 2;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(35px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Crypto Card */
    .crypto-card {
      background: rgba(19, 22, 31, 0.85);
      backdrop-filter: blur(18px);
      border-radius: 42px;
      padding: 34px 28px;
      border: 1px solid rgba(247, 147, 26, 0.3);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(247, 147, 26, 0.1), 0 0 30px rgba(247, 147, 26, 0.2);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease;
    }
    .crypto-card:hover {
      transform: scale(1.01);
      box-shadow: 0 30px 55px rgba(247, 147, 26, 0.2);
    }

    /* Glowing border line */
    .crypto-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #F7931A, #FDC830, #F7931A);
      border-radius: 44px;
      z-index: -1;
      opacity: 0.3;
      filter: blur(6px);
    }

    /* Logo Area - Bitcoin */
    .logo-bitcoin {
      text-align: center;
      margin-bottom: 28px;
    }
    .btc-icon-box {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 18px;
      background: linear-gradient(145deg, #1E232F, #0F111A);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
      border: 1px solid rgba(247, 147, 26, 0.4);
    }
    .btc-icon-box i {
      font-size: 56px;
      color: #F7931A;
      filter: drop-shadow(0 0 8px rgba(247,147,26,0.6));
      animation: pulseGold 2.5s infinite;
    }
    @keyframes pulseGold {
      0% { text-shadow: 0 0 0px #F7931A; transform: scale(1); }
      50% { text-shadow: 0 0 12px #F7931A; transform: scale(1.02); }
      100% { text-shadow: 0 0 0px #F7931A; transform: scale(1); }
    }
    .ring-gold {
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      border-radius: 50%;
      border: 1px solid rgba(247, 147, 26, 0.5);
      animation: rotateRing 18s linear infinite;
    }
    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .brand-crypto h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #F7931A, #FDC830);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .brand-crypto p {
      color: #B0B7C9;
      font-size: 15px;
      font-weight: 500;
      background: rgba(247,147,26,0.15);
      display: inline-block;
      padding: 5px 14px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    /* Form Styling */
    .form-group {
      margin-bottom: 24px;
    }
    .form-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 14px;
      color: #E5E7EB;
      letter-spacing: 0.3px;
    }
    .form-label i {
      color: #F7931A;
      font-size: 16px;
    }
    .phone-group {
      display: flex;
      background: rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(247, 147, 26, 0.4);
      border-radius: 20px;
      transition: all 0.2s;
    }
    .phone-group:focus-within {
      border-color: #F7931A;
      box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.25);
      background: #0A0C12;
    }
    .prefix-62 {
      padding: 0 18px;
      background: rgba(247, 147, 26, 0.2);
      color: #F7931A;
      font-weight: 700;
      font-size: 17px;
      display: flex;
      align-items: center;
      border-right: 1px solid rgba(247, 147, 26, 0.3);
      border-radius: 20px 0 0 20px;
    }
    .phone-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 18px 16px;
      font-size: 17px;
      color: white;
      outline: none;
      font-weight: 500;
    }
    .phone-input::placeholder {
      color: #6B7280;
    }
    .input-icon-wrap {
      position: relative;
    }
    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(247, 147, 26, 0.4);
      border-radius: 20px;
      padding: 18px 20px;
      font-size: 16px;
      color: white;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #F7931A;
      box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.25);
      background: #0A0C12;
    }
    .toggle-pwd {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      cursor: pointer;
      font-size: 18px;
      transition: color 0.2s;
    }
    .toggle-pwd:hover {
      color: #F7931A;
    }

    .form-hint {
      font-size: 12px;
      margin-top: 8px;
      margin-left: 12px;
      color: #9CA3AF;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    /* Hashrate animation line */
    .hash-stats {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 20px 0 10px;
      font-size: 11px;
      font-family: monospace;
      color: #F7931A;
      background: rgba(247,147,26,0.08);
      padding: 10px;
      border-radius: 60px;
      backdrop-filter: blur(2px);
    }
    .hash-stats span {
      letter-spacing: 1px;
    }
    .progress-crypto {
      margin: 20px 0;
      display: none;
    }
    .progress-bar-bg {
      height: 5px;
      background: #262E3D;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill-gold {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #F7931A, #FDC830);
      border-radius: 10px;
      transition: width 0.4s ease;
      box-shadow: 0 0 6px #F7931A;
    }
    /* Submit Button */
    .submit-crypto {
      width: 100%;
      padding: 18px;
      background: linear-gradient(95deg, #F7931A, #F9B43A);
      border: none;
      border-radius: 34px;
      font-weight: 800;
      font-size: 18px;
      color: #0D0E15;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
      box-shadow: 0 8px 20px rgba(247, 147, 26, 0.3);
    }
    .submit-crypto:hover:enabled {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 28px rgba(247, 147, 26, 0.5);
    }
    .submit-crypto:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .spinner-gold {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(0,0,0,0.2);
      border-top: 3px solid #0D0E15;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Register link */
    .register-crypto {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(247, 147, 26, 0.2);
    }
    .register-crypto a {
      color: #F7931A;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(247, 147, 26, 0.1);
      padding: 12px 24px;
      border-radius: 40px;
      transition: 0.2s;
    }
    .register-crypto a:hover {
      background: rgba(247, 147, 26, 0.25);
      transform: translateY(-2px);
    }

    /* Modal Success */
    .modal-bit {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 5, 7, 0.9);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal-content {
      background: #13161F;
      border-radius: 48px;
      max-width: 340px;
      width: 90%;
      padding: 40px 28px;
      text-align: center;
      border: 1px solid #F7931A;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6);
      animation: modalPop 0.35s ease;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-icon-btc {
      background: radial-gradient(circle, #F7931A, #B85C00);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-icon-btc i {
      font-size: 44px;
      color: #0D0E15;
    }
    .modal-title-gold {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #F7931A, #FDC830);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .modal-text {
      color: #B0B7C9;
      margin: 20px 0 15px;
    }
    @media (max-width: 480px) {
      .crypto-card { padding: 28px 18px; }
      .brand-crypto h1 { font-size: 28px; }
      .phone-group, .form-input { border-radius: 18px; }
    }
  </style>
</head>
<body>

<div class="hex-bg"></div>
<div class="crypto-dust" id="dustContainer"></div>

<div class="container">
  <div class="crypto-card">
    <div class="logo-bitcoin">
      <div class="btc-icon-box">
        <i class="fab fa-bitcoin"></i>
        <div class="ring-gold"></div>
      </div>
      <div class="brand-crypto">
        <h1>BITCOIN ACCESS</h1>
        <p><i class="fas fa-shield-alt"></i> Wallet Secure · Web3 Login</p>
      </div>
    </div>

    <form id="loginFormCrypto">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-whatsapp"></i> Nomor WhatsApp</label>
        <div class="phone-group">
          <div class="prefix-62">+62</div>
          <input type="tel" class="phone-input" id="cryptoPhone" placeholder="81234567890" autofocus inputmode="numeric" onkeypress="return event.charCode >= 48 && event.charCode <= 57">
        </div>
        <div class="form-hint"><i class="fas fa-key"></i> Gunakan nomor WhatsApp aktif (tanpa 0 di depan)</div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Private Key / Sandi</label>
        <div class="input-icon-wrap">
          <input type="password" class="form-input" id="cryptoPassword" placeholder="Masukkan kata sandi akun" required>
          <i class="fas fa-eye toggle-pwd" id="toggleCryptoPwd"></i>
        </div>
      </div>

      <div class="hash-stats">
        <span><i class="fas fa-microchip"></i> BLOCK HEIGHT: 876,432</span>
        <span><i class="fas fa-charging-station"></i> HASHRATE: 712 EH/s</span>
      </div>

      <div class="progress-crypto" id="progressCrypto">
        <div class="progress-bar-bg">
          <div class="progress-fill-gold" id="progressGoldFill"></div>
        </div>
      </div>

      <button type="submit" class="submit-crypto" id="cryptoSubmitBtn">
        <i class="fab fa-bitcoin"></i>
        <span id="cryptoBtnText">MASUK KE WALLET</span>
        <div class="spinner-gold" id="cryptoSpinner"></div>
      </button>
    </form>

    <div class="register-crypto">
      <a href="register.html">
        <i class="fas fa-user-astronaut"></i> Belum punya akun? Daftar sekarang
      </a>
    </div>
  </div>
</div>

<!-- Modal sukses bitcoin -->
<div class="modal-bit" id="btcSuccessModal">
  <div class="modal-content">
    <div class="modal-icon-btc"><i class="fab fa-bitcoin"></i></div>
    <h3 class="modal-title-gold">Login Sukses!</h3>
    <p class="modal-text">Mengakses dashboard Bitcoin Anda ...</p>
    <div class="hash-stats" style="justify-content: center;"><i class="fas fa-spinner fa-pulse"></i> Verifikasi Blockchain</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  // Konfigurasi Firebase (tetap sama, hanya tema berubah)
  const firebaseConfig = {
    apiKey: "AIzaSyAuJSxpcFZ1QI-dEsEnx2qSqlb0wsvs6Mc",
    authDomain: "lginvest-776cf.firebaseapp.com",
    databaseURL: "https://lginvest-776cf-default-rtdb.firebaseio.com",
    projectId: "lginvest-776cf",
    storageBucket: "lginvest-776cf.firebasestorage.app",
    messagingSenderId: "831934282072",
    appId: "1:831934282072:web:6a8b7a5bcba5d4d1264d2d",
    measurementId: "G-265YF9DYCF"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // DOM elements
  const form = document.getElementById('loginFormCrypto');
  const phoneField = document.getElementById('cryptoPhone');
  const passField = document.getElementById('cryptoPassword');
  const toggleBtn = document.getElementById('toggleCryptoPwd');
  const submitBtn = document.getElementById('cryptoSubmitBtn');
  const btnTextSpan = document.getElementById('cryptoBtnText');
  const spinnerEl = document.getElementById('cryptoSpinner');
  const progressDiv = document.getElementById('progressCrypto');
  const progressFill = document.getElementById('progressGoldFill');
  const successModal = document.getElementById('btcSuccessModal');

  // Toggle password visibility
  toggleBtn.addEventListener('click', () => {
    const type = passField.type === 'password' ? 'text' : 'password';
    passField.type = type;
    toggleBtn.classList.toggle('fa-eye');
    toggleBtn.classList.toggle('fa-eye-slash');
  });

  // validasi nomor hp : harus 8xxxxxxx (9-13 digit setelah 62)
  function validatePhone(phoneDigits) {
    return /^8\d{8,12}$/.test(phoneDigits);
  }

  function getFullPhone(phoneDigits) {
    return '62' + phoneDigits;
  }

  // Hanya angka di input hp
  phoneField.addEventListener('input', function(e) {
    this.value = this.value.replace(/\D/g, '');
  });
  phoneField.addEventListener('keydown', function(e) {
    if (e.key === '0' && this.selectionStart === 0) e.preventDefault();
  });
  // Format tampilan blur (opsional)
  phoneField.addEventListener('blur', function() {
    let raw = this.value.replace(/\D/g, '');
    if (raw.length >= 9) {
      let fmt = raw.replace(/(\d{3})(\d{4})(\d{0,4})/, '$1 $2 $3').trim();
      this.value = fmt;
    }
  });
  phoneField.addEventListener('focus', function() {
    this.value = this.value.replace(/\D/g, '');
  });

  // Fungsi cek login ke Firebase
  async function performLogin(phoneDigits, password) {
    const fullPhone = getFullPhone(phoneDigits);
    const userRef = ref(db, 'users/' + fullPhone);
    const snap = await get(userRef);
    if (snap.exists()) {
      const userData = snap.val();
      if (userData.password === password) {
        localStorage.setItem('nohp', fullPhone);
        localStorage.setItem('currentUser', JSON.stringify(userData));
        return { success: true, data: userData };
      } else {
        return { success: false, message: '❌ Kata sandi salah. Periksa kembali.' };
      }
    } else {
      return { success: false, message: '⚠️ Akun tidak ditemukan. Silakan daftar terlebih dahulu.' };
    }
  }

  // Animasi progress
  function setProgress(percent) {
    progressFill.style.width = percent + '%';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let rawPhone = phoneField.value.replace(/\D/g, '');
    const password = passField.value;

    if (!validatePhone(rawPhone)) {
      alert('⚠️ Nomor WhatsApp tidak valid!\nFormat: 8xxx (total 9-13 digit, contoh: 81234567890)');
      phoneField.focus();
      return;
    }
    if (!password.trim()) {
      alert('🔒 Kata sandi tidak boleh kosong.');
      passField.focus();
      return;
    }

    // disable button + progress tampil
    submitBtn.disabled = true;
    btnTextSpan.innerHTML = 'Memverifikasi Blockchain...';
    spinnerEl.style.display = 'inline-block';
    progressDiv.style.display = 'block';
    setProgress(0);

    // simulasi progres animasi
    let prog = 0;
    const interval = setInterval(() => {
      if (prog < 85) {
        prog += Math.floor(Math.random() * 8) + 3;
        if (prog > 85) prog = 85;
        setProgress(prog);
      }
    }, 150);

    try {
      const result = await performLogin(rawPhone, password);
      if (result.success) {
        setProgress(100);
        setTimeout(() => {
          clearInterval(interval);
          // sembunyikan progress setelah sukses
          setTimeout(() => {
            submitBtn.disabled = false;
            btnTextSpan.innerHTML = 'MASUK KE WALLET';
            spinnerEl.style.display = 'none';
            progressDiv.style.display = 'none';
            setProgress(0);
            // tampilkan modal sukses
            successModal.style.display = 'flex';
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1600);
          }, 400);
        }, 300);
      } else {
        clearInterval(interval);
        setProgress(0);
        progressDiv.style.display = 'none';
        submitBtn.disabled = false;
        btnTextSpan.innerHTML = 'MASUK KE WALLET';
        spinnerEl.style.display = 'none';
        alert(result.message);
      }
    } catch (err) {
      clearInterval(interval);
      setProgress(0);
      progressDiv.style.display = 'none';
      submitBtn.disabled = false;
      btnTextSpan.innerHTML = 'MASUK KE WALLET';
      spinnerEl.style.display = 'none';
      alert('Kesalahan jaringan: ' + err.message);
    }
  });

  // Efek partikel crypto (dust)
  function createDust() {
    const container = document.getElementById('dustContainer');
    for (let i = 0; i < 40; i++) {
      const dust = document.createElement('div');
      dust.classList.add('dust');
      const size = Math.random() * 4 + 2;
      dust.style.width = size + 'px';
      dust.style.height = size + 'px';
      dust.style.left = Math.random() * 100 + '%';
      dust.style.animationDelay = Math.random() * 20 + 's';
      dust.style.animationDuration = Math.random() * 12 + 10 + 's';
      container.appendChild(dust);
    }
  }
  createDust();
  
  // sedikit sentuhan tambahan: jika tekan enter langsung submit
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && document.activeElement === passField) {
      form.dispatchEvent(new Event('submit'));
    }
  });
</script>
</body>
</html>
